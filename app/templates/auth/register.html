{% extends "base.html" %}
{% block title %}Регистрация{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <h2>Регистрация</h2>
    <form method="POST" action="{{ url_for('auth.register') }}">
      <div class="form-group">
        <label>Имя *</label>
        <input type="text" name="name" required autofocus placeholder="Ваше имя">
      </div>
      <div class="form-group">
        <label>Фамилия</label>
        <input type="text" name="surname" placeholder="Необязательно">
      </div>
      <div class="form-group">
        <label>Email *</label>
        <input type="email" name="email" required placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label>Дата рождения</label>
        <input type="date" name="birth_date">
      </div>
      <div class="form-group">
        <label>Пароль * <small>(не менее 6 символов)</small></label>
        <input type="password" name="password" required placeholder="••••••" minlength="6">
      </div>
      <div class="form-group">
        <label>Повторите пароль *</label>
        <input type="password" name="confirm_password" required placeholder="••••••">
      </div>
      <button type="submit" class="btn btn-primary btn-full">Создать аккаунт</button>
    </form>
    <p class="auth-switch">Уже есть аккаунт? <a href="{{ url_for('auth.login') }}">Войти</a></p>
  </div>
</div>
{% endblock %}
